{% extends "base.html" %}
{% block title %}Конвертер валют онлайн — актуальные курсы{% endblock %}
{% block content %}
    <h1>Конвертер валют онлайн</h1>
    <meta name="description" content="Конвертируйте рубли, доллары и евро онлайн по курсу ЦБ РФ.">
    <meta name="keywords" content="конвертер валют онлайн, курс рубля">
    <form class="tool-form currency-form">
        <div class="currency-block">
            <input type="number" id="amount" name="amount" step="0.01" value="{{ amount }}" required style="width: 150px;">
            <select id="from_currency" name="from_currency" style="width: 150px;">
                {% for currency in currencies %}
                    <option value="{{ currency }}" {% if currency == from_currency %}selected{% endif %}>{{ currency }}</option>
                {% endfor %}
            </select>
        </div>
        <span class="arrow">↔</span>
        <div class="currency-block">
            <input type="number" id="result" name="result" step="0.01" value="{{ result if result is not none else '' }}" readonly style="width: 150px;">
            <select id="to_currency" name="to_currency" style="width: 150px;">
                {% for currency in currencies %}
                    <option value="{{ currency }}" {% if currency == to_currency %}selected{% endif %}>{{ currency }}</option>
                {% endfor %}
            </select>
        </div>
    </form>
    {% if result is not none %}
        <div class="result">
            <p>{{ amount }} {{ from_currency }} = {{ result }} {{ to_currency }}</p>
        </div>
    {% endif %}
    <div class="ad-block" style="width: 320px; height: 50px; background: #ccc;">Яндекс.Директ (320x50)</div>

    <script>
        // Курсы валют от сервера
        const rates = {{ rates|tojson }};

        function updateCurrency() {
            const amount = parseFloat(document.getElementById('amount').value) || 0;
            const fromCurrency = document.getElementById('from_currency').value;
            const toCurrency = document.getElementById('to_currency').value;
            const result = (amount * rates[fromCurrency]) / rates[toCurrency];
            document.getElementById('result').value = result.toFixed(2);
            document.querySelector('.result p').textContent = `${amount} ${fromCurrency} = ${result.toFixed(2)} ${toCurrency}`;
        }

        // Слушатели событий для автоматического пересчёта
        document.getElementById('amount').addEventListener('input', updateCurrency);
        document.getElementById('from_currency').addEventListener('change', updateCurrency);
        document.getElementById('to_currency').addEventListener('change', updateCurrency);

        // Инициализация при загрузке
        updateCurrency();
    </script>
{% endblock %}
