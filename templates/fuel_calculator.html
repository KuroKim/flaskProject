{% extends "base.html" %}
{% block title %}Калькулятор бензина{% endblock %}
{% block content %}
    <h1>Калькулятор бензина</h1>
    <div class="fuel-calculator">
        <div class="calculator-form">
            <div class="input-block">
                <label>Расстояние (км):</label>
                <input type="number" id="distance" step="0.01" value="" oninput="calculateFuel()">
            </div>
            <div class="input-block">
                <label>Расход (л/100 км):</label>
                <input type="number" id="consumption" step="0.01" value="" oninput="calculateFuel()">
            </div>
            <div class="input-block">
                <label>Цена за литр:</label>
                <select id="currency" onchange="updateResultCurrency()">
                    <option value="RUB">RUB</option>
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                    <option value="JPY">JPY</option>
                    <option value="CAD">CAD</option>
                    <option value="AUD">AUD</option>
                    <option value="CHF">CHF</option>
                </select>
                <input type="number" id="price_per_liter" step="0.01" value="" oninput="calculateFuel()">
            </div>
            <div class="input-block">
                <label>Общая стоимость:</label>
                <select id="result_currency" onchange="convertTotalCost()">
                    <option value="RUB">RUB</option>
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                    <option value="JPY">JPY</option>
                    <option value="CAD">CAD</option>
                    <option value="AUD">AUD</option>
                    <option value="CHF">CHF</option>
                </select>
                <input type="number" id="total_cost" step="0.01" value="" readonly>
            </div>
        </div>
        <div class="controls">
            <button onclick="clearFields()">Очистить</button>
        </div>
    </div>
    <div class="history">
        <h3>История расчётов</h3>
        <button class="clear-history" onclick="clearHistory()">Очистить историю</button>
        <ul id="history-list"></ul>
    </div>
    <script>
        let distance = document.getElementById('distance');
        let consumption = document.getElementById('consumption');
        let pricePerLiter = document.getElementById('price_per_liter');
        let totalCost = document.getElementById('total_cost');
        let currency = document.getElementById('currency');
        let resultCurrency = document.getElementById('result_currency');
        let historyList = document.getElementById('history-list');
        let debounceTimeout;

        // Используем курсы, переданные сервером
        let exchangeRates = {{ exchange_rates | tojson }};
        console.log("Курсы валют, переданные в JavaScript:", exchangeRates);

        // Функция для форматирования чисел
        function formatNumber(value, currency) {
            // Форматируем число с разделителями тысяч и фиксированным количеством знаков
            const formattedValue = value.toLocaleString('ru-RU', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });

            // Добавляем символ валюты (для цены и общей стоимости)
            if (currency) {
                const currencySymbols = {
                    'RUB': '₽',
                    'USD': '$',
                    'EUR': '€',
                    'JPY': '¥',
                    'CAD': 'C$',
                    'AUD': 'A$',
                    'CHF': 'CHF'
                };
                const symbol = currencySymbols[currency] || currency;
                return `${formattedValue} ${symbol}`;
            }
            // Для расстояния и расхода возвращаем только число
            return formattedValue;
        }

        function updateResultCurrency() {
            // Очистка только цены за литр при смене валюты
            pricePerLiter.value = '';
            clearTimeout(debounceTimeout);
            calculateFuel();
        }

        function calculateFuel() {
            let dist = parseFloat(distance.value) || 0;
            let cons = parseFloat(consumption.value) || 0;
            let price = parseFloat(pricePerLiter.value) || 0;
            let fromCurrency = currency.value;
            let toCurrency = resultCurrency.value;

            if (dist !== 0 && cons !== 0 && price !== 0) {
                let liters = (dist / 100) * cons;
                let costInBase = liters * price; // Стоимость в валюте цены за литр
                let finalCost;

                // Если исходная и целевая валюты совпадают, возвращаем стоимость без конвертации
                if (fromCurrency === toCurrency) {
                    finalCost = costInBase;
                } else {
                    // Конвертация в RUB
                    let costInRUB = fromCurrency === 'RUB' ? costInBase : costInBase * exchangeRates[fromCurrency];
                    console.log(`costInRUB: ${costInRUB}, fromCurrency: ${fromCurrency}, exchangeRates[${fromCurrency}]: ${exchangeRates[fromCurrency]}`);
                    // Конвертация из RUB в итоговую валюту
                    finalCost = costInRUB / (toCurrency === 'RUB' ? 1 : exchangeRates[toCurrency]);
                    console.log(`finalCost: ${finalCost}, toCurrency: ${toCurrency}, exchangeRates[${toCurrency}]: ${exchangeRates[toCurrency]}`);
                }

                totalCost.value = finalCost.toFixed(2);

                totalCost.classList.add('updated');
                setTimeout(() => totalCost.classList.remove('updated'), 300);

                // Сохраняем значения для истории
                const historyDist = dist;
                const historyCons = cons;
                const historyPrice = price;
                const historyFinalCost = finalCost;
                const historyFromCurrency = fromCurrency;
                const historyToCurrency = toCurrency;

                clearTimeout(debounceTimeout);
                debounceTimeout = setTimeout(() => {
                    console.log(`Запись в историю: dist=${historyDist}, cons=${historyCons}, price=${historyPrice}, finalCost=${historyFinalCost}, fromCurrency=${historyFromCurrency}, toCurrency=${historyToCurrency}`);
                    let entry = `${formatNumber(historyDist)} км, ${formatNumber(historyCons)} л/100км, ${formatNumber(historyPrice, historyFromCurrency)}/л = ${formatNumber(historyFinalCost, historyToCurrency)}`;
                    addToHistory(entry);
                    saveHistory(entry);
                }, 500);
            }
        }

        function convertTotalCost() {
            let dist = parseFloat(distance.value) || 0;
            let cons = parseFloat(consumption.value) || 0;
            let price = parseFloat(pricePerLiter.value) || 0;
            let fromCurrency = currency.value;
            let toCurrency = resultCurrency.value;

            if (dist !== 0 && cons !== 0 && price !== 0) {
                let liters = (dist / 100) * cons;
                let costInBase = liters * price; // Стоимость в валюте цены за литр
                let finalCost;

                // Если исходная и целевая валюты совпадают, возвращаем стоимость без конвертации
                if (fromCurrency === toCurrency) {
                    finalCost = costInBase;
                } else {
                    // Конвертация в RUB
                    let costInRUB = fromCurrency === 'RUB' ? costInBase : costInBase * exchangeRates[fromCurrency];
                    console.log(`costInRUB: ${costInRUB}, fromCurrency: ${fromCurrency}, exchangeRates[${fromCurrency}]: ${exchangeRates[fromCurrency]}`);
                    // Конвертация из RUB в итоговую валюту
                    finalCost = costInRUB / (toCurrency === 'RUB' ? 1 : exchangeRates[toCurrency]);
                    console.log(`finalCost: ${finalCost}, toCurrency: ${toCurrency}, exchangeRates[${toCurrency}]: ${exchangeRates[toCurrency]}`);
                }

                totalCost.value = finalCost.toFixed(2);

                totalCost.classList.add('updated');
                setTimeout(() => totalCost.classList.remove('updated'), 300);

                // Сохраняем значения для истории
                const historyDist = dist;
                const historyCons = cons;
                const historyPrice = price;
                const historyFinalCost = finalCost;
                const historyFromCurrency = fromCurrency;
                const historyToCurrency = toCurrency;

                clearTimeout(debounceTimeout);
                debounceTimeout = setTimeout(() => {
                    console.log(`Запись в историю: dist=${historyDist}, cons=${historyCons}, price=${historyPrice}, finalCost=${historyFinalCost}, fromCurrency=${historyFromCurrency}, toCurrency=${historyToCurrency}`);
                    let entry = `${formatNumber(historyDist)} км, ${formatNumber(historyCons)} л/100км, ${formatNumber(historyPrice, historyFromCurrency)}/л = ${formatNumber(historyFinalCost, historyToCurrency)}`;
                    addToHistory(entry);
                    saveHistory(entry);
                }, 500);
            }
        }

        function clearFields() {
            distance.value = '';
            consumption.value = '';
            pricePerLiter.value = '';
            totalCost.value = '';
            clearTimeout(debounceTimeout);
        }

        function addToHistory(entry) {
            let li = document.createElement('li');
            li.textContent = entry;
            historyList.insertBefore(li, historyList.firstChild);
            if (historyList.children.length > 10) {
                historyList.removeChild(historyList.lastChild);
            }
        }

        function saveHistory(entry) {
            let history = JSON.parse(localStorage.getItem('fuelHistory')) || [];
            history.unshift(entry);
            if (history.length > 10) history.pop();
            localStorage.setItem('fuelHistory', JSON.stringify(history));
        }

        function loadHistory() {
            let history = JSON.parse(localStorage.getItem('fuelHistory')) || [];
            console.log("Загруженная история из localStorage:", history);
            historyList.innerHTML = ''; // Очищаем список перед загрузкой
            history.forEach(entry => {
                let li = document.createElement('li');
                li.textContent = entry;
                historyList.appendChild(li);
            });
        }

        function clearHistory() {
            historyList.innerHTML = '';
            localStorage.removeItem('fuelHistory');
            console.log("История очищена, localStorage['fuelHistory']:", localStorage.getItem('fuelHistory'));
        }

        loadHistory();
    </script>
{% endblock %}
