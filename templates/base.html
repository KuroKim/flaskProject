<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} - Полезные инструменты</title>
    <meta name="description" content="Удобные онлайн-инструменты для повседневного использования">
    <meta name="keywords" content="калькулятор, конвертер, таймер, погода, QR-код, калькулятор бензина">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-container">
            <h1><a href="/" class="home-link">Полезные инструменты</a></h1>
            <button class="menu-toggle">☰</button>
            <nav class="nav-menu">
                <ul>
                    <li><a href="/">Главная</a></li>
                    <li><a href="/calculator">Калькулятор</a></li>
                    <li><a href="/currency">Конвертер валют</a></li>
                    <li><a href="/converter">Конвертер величин</a></li>
                    <li><a href="/pressure_converter">BAR ↔ PSI</a></li>
                    <li><a href="/timer">Таймер</a></li>
                    <li><a href="/weather">Погода</a></li>
                    <li><a href="/qr-code">QR-код</a></li>
                    <li><a href="/fuel-calculator">Калькулятор бензина</a></li>
                </ul>
            </nav>
            <div class="theme-switcher">
                <button id="theme-toggle">Тёмная тема</button>
            </div>
        </div>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>Понравился сайт? <a href="#" class="donate-btn">Поддержать</a></p>
        <p><a href="#">Предложить инструмент</a></p>
    </footer>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
