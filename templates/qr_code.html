{% extends "base.html" %}
{% block title %}Создать QR-код онлайн{% endblock %}
{% block content %}
    <h1>Создать QR-код онлайн</h1>
    <form method="POST" class="tool-form">
        <label for="qr-text">Текст или URL</label>
        <input type="text" id="qr-text" name="text" placeholder="Введите текст или URL" required>
        <button type="submit">Сгенерировать и скачать</button>
    </form>
{% endblock %}
