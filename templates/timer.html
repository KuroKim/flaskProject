{% extends "base.html" %}
{% block title %}Таймер онлайн{% endblock %}
{% block content %}
    <h1>Таймер онлайн</h1>
    <div class="tool-form">
        <h3>Таймер</h3>
        <div class="time-inputs">
            <label>Часы<input type="number" id="hours" placeholder="ч" min="0"></label>
            <label>Минуты<input type="number" id="minutes" placeholder="мин" min="0" max="59"></label>
            <label>Секунды<input type="number" id="seconds" placeholder="сек" min="0" max="59"></label>
        </div>
        <button onclick="startTimer()">Старт</button>
        <button onclick="pauseTimer()">Пауза</button>
        <button onclick="resetTimer()">Сброс</button>
        <div class="result" id="timer-display"></div>
    </div>
    <div class="tool-form">
        <h3>Секундомер</h3>
        <button onclick="startStopwatch()">Старт</button>
        <button onclick="pauseStopwatch()">Пауза</button>
        <button onclick="resetStopwatch()">Сброс</button>
        <div class="result" id="stopwatch-display">00:00:00</div>
    </div>
    <script>
        let timerInterval, stopwatchInterval;
        let timerSeconds = 0, stopwatchSeconds = 0;
        let timerRunning = false, stopwatchRunning = false;

        function formatTime(seconds) {
            let h = Math.floor(seconds / 3600);
            let m = Math.floor((seconds % 3600) / 60);
            let s = seconds % 60;
            return `${h < 10 ? '0' + h : h}:${m < 10 ? '0' + m : m}:${s < 10 ? '0' + s : s}`;
        }

        // Таймер
        function startTimer() {
            if (!timerRunning) {
                let hours = parseInt(document.getElementById('hours').value) || 0;
                let minutes = parseInt(document.getElementById('minutes').value) || 0;
                let seconds = parseInt(document.getElementById('seconds').value) || 0;
                timerSeconds = hours * 3600 + minutes * 60 + seconds;
                timerRunning = true;
                timerInterval = setInterval(() => {
                    if (timerSeconds <= 0) {
                        clearInterval(timerInterval);
                        timerRunning = false;
                        document.getElementById('timer-display').textContent = "Время вышло!";
                    } else {
                        document.getElementById('timer-display').textContent = formatTime(timerSeconds);
                        timerSeconds--;
                    }
                }, 1000);
            }
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            timerRunning = false;
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timerRunning = false;
            timerSeconds = 0;
            document.getElementById('timer-display').textContent = "";
        }

        // Секундомер
        function startStopwatch() {
            if (!stopwatchRunning) {
                stopwatchRunning = true;
                stopwatchInterval = setInterval(() => {
                    stopwatchSeconds++;
                    document.getElementById('stopwatch-display').textContent = formatTime(stopwatchSeconds);
                }, 1000);
            }
        }

        function pauseStopwatch() {
            clearInterval(stopwatchInterval);
            stopwatchRunning = false;
        }

        function resetStopwatch() {
            clearInterval(stopwatchInterval);
            stopwatchRunning = false;
            stopwatchSeconds = 0;
            document.getElementById('stopwatch-display').textContent = "00:00:00";
        }
    </script>
{% endblock %}
