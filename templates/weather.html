{% extends "base.html" %}
{% block title %}Погода онлайн{% endblock %}
{% block content %}
    <h1>Погода онлайн</h1>
    <form method="POST" class="tool-form">
        <input type="text" name="city" placeholder="Введите город" required>
        <button type="submit">Узнать погоду</button>
    </form>
    {% if weather_data %}
        <div class="result">
            <p>{{ weather_data.city }}: {{ weather_data.temp }}°C, {{ weather_data.description }}</p>
        </div>
    {% endif %}
    <div class="ad-block" style="width: 320px; height: 50px; background: #ccc;">Яндекс.Директ (320x50)</div>
{% endblock %}
